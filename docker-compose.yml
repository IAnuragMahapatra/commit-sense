services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: commitsense
      POSTGRES_USER: commitsense
      POSTGRES_PASSWORD: commitsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn dashboard.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://commitsense:commitsense@db:5432/commitsense
    depends_on:
      - db
    volumes:
      - .:/app
    working_dir: /app

volumes:
  postgres_data:
